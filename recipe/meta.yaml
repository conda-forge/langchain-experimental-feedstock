{% set version = "0.4.1" %}

package:
  name: langchain-experimental
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-experimental/langchain_experimental-{{ version }}.tar.gz
  sha256: ab6b19a0b98fbc15225fbfcf096176fec339b7e3e930bcf328bb717985fc1da5

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.0.0
    - pip
  run:
    - python >={{ python_min }},<4.0
    - langchain-core <2.0.0,>=1.0.0
    - langchain-community <1.0.0,>=0.4.0

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - langchain_experimental

about:
  home: https://github.com/langchain-ai/langchain/tree/master/libs/experimental
  license: MIT
  license_file: LICENSE
  summary: This package holds experimental LangChain code, intended for research and experimental uses.

extra:
  recipe-maintainers:
    - raybellwaves
    - jan-janssen
